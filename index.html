<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelvin Weather Converter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🌡 Kelvin Weather Converter</h1>

        <p>
            This project converts temperature from
            <strong>Kelvin</strong> to
            <strong>Celsius</strong>,
            <strong>Fahrenheit</strong>,
            and
            <strong>Newton</strong>.
        </p>

        <div class="card">

            <h2>Results</h2>

            <p id="kelvin"></p>
            <p id="celsius"></p>
            <p id="fahrenheit"></p>
            <p id="newton"></p>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
